name: Release cyberbox-agent

# Triggered by version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create GitHub Releases

# ── Build matrix ──────────────────────────────────────────────────────────────
#
#  Target                          Runner          Notes
#  x86_64-pc-windows-msvc          windows-latest  native, includes WEL support
#  x86_64-unknown-linux-musl       ubuntu-latest   static binary, no glibc dep
#  aarch64-unknown-linux-musl      ubuntu-latest   cross-compiled via `cross`

jobs:
  # ── Extract version from tag (v0.1.0 → 0.1.0) ────────────────────────────────
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

  build:
    name: Build · ${{ matrix.target }}
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target:     x86_64-pc-windows-msvc
            os:         windows-latest
            binary:     cyberbox-agent.exe
            artifact:   cyberbox-agent-windows-x86_64.exe
            use_cross:  false

          - target:     x86_64-unknown-linux-musl
            os:         ubuntu-latest
            binary:     cyberbox-agent
            artifact:   cyberbox-agent-linux-x86_64
            use_cross:  false

          - target:     aarch64-unknown-linux-musl
            os:         ubuntu-latest
            binary:     cyberbox-agent
            artifact:   cyberbox-agent-linux-aarch64
            use_cross:  true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── Linux x86 musl ──────────────────────────────────────────────────────
      - name: Install musl-tools (x86 musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      # ── ARM cross-compilation ────────────────────────────────────────────────
      - name: Install cross (ARM)
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --package cyberbox-agent --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --package cyberbox-agent --target ${{ matrix.target }}

      # ── Collect artifact ──────────────────────────────────────────────────────
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             dist/${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  # ── Build MSI installer (Windows only) ───────────────────────────────────────
  build-msi:
    name: Build · Windows MSI installer
    needs: setup
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Windows binary
        run: cargo build --release --package cyberbox-agent --target x86_64-pc-windows-msvc

      - name: Install WiX Toolset v4
        run: dotnet tool install --global wix

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build MSI
        shell: pwsh
        run: |
          wix build packaging/windows/cyberbox-agent.wxs `
            -d Version=${{ needs.setup.outputs.version }} `
            -d BinaryPath=target/x86_64-pc-windows-msvc/release/cyberbox-agent.exe `
            -d ConfigPath=apps/cyberbox-agent/agent.example.toml `
            -d IconPath=web/cyberbox-ui/public/cyberboxlogo.png `
            -o packaging/windows/cyberbox-agent-${{ needs.setup.outputs.version }}.msi

      - name: Stage MSI artifact
        shell: bash
        run: |
          mkdir -p dist
          # Versioned copy: cyberbox-agent-0.1.2.msi
          cp packaging/windows/cyberbox-agent-${{ needs.setup.outputs.version }}.msi \
             dist/cyberbox-agent-${{ needs.setup.outputs.version }}.msi
          # Stable-name copy: cyberbox-agent-windows.msi (always /latest/download/)
          cp packaging/windows/cyberbox-agent-${{ needs.setup.outputs.version }}.msi \
             dist/cyberbox-agent-windows.msi

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberbox-agent-msi
          path: dist/cyberbox-agent-*.msi

  # ── Create GitHub Release ────────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [setup, build, build-msi]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List dist
        run: ls -lh dist/

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## cyberbox-agent ${{ github.ref_name }}

            Agente leve de encaminhamento de logs para CyberboxSIEM.

            ### Downloads

            | Plataforma | Arquivo |
            |---|---|
            | Windows x86_64 — Instalador MSI (recomendado, GPO) | `cyberbox-agent-${{ needs.setup.outputs.version }}.msi` |
            | Windows x86_64 — Binário standalone | `cyberbox-agent-windows-x86_64.exe` |
            | Linux x86_64 (musl estático) | `cyberbox-agent-linux-x86_64` |
            | Linux ARM64 (musl estático) | `cyberbox-agent-linux-aarch64` |

            ### Instalação rápida Windows (MSI silencioso)
            ```powershell
            msiexec /i cyberbox-agent-${{ needs.setup.outputs.version }}.msi /qn
            ```

            ### Instalação rápida Linux
            ```bash
            chmod +x cyberbox-agent-linux-x86_64
            sudo mv cyberbox-agent-linux-x86_64 /usr/local/bin/cyberbox-agent
            ```

            Veja [agent.example.toml](https://github.com/${{ github.repository }}/blob/main/apps/cyberbox-agent/agent.example.toml) para referência completa de configuração.
