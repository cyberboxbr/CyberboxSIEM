name: CI

on:
  push:
    branches: [master, main, develop]
  pull_request:
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-check:
    name: Rust | clippy + test
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: /tmp/cyberbox-target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Run tests
        run: cargo test --workspace

  web-build:
    name: Web | build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/cyberbox-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/cyberbox-ui/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build

  dashboard-build:
    name: Dashboard | lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cyberbox-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/cyberbox-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  detection-content:
    name: Detection Content | bundled rules
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: /tmp/cyberbox-target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Verify bundled rule pack
        run: cargo test -p cyberbox-api bundled_rules_e2e_import_ingest_alert -- --exact

  docker-build:
    name: Docker | ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: [rust-check, web-build, dashboard-build, detection-content]
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: apps/cyberbox-api/Dockerfile
            context: .
          - component: worker
            dockerfile: apps/cyberbox-worker/Dockerfile
            context: .
          - component: collector
            dockerfile: apps/cyberbox-collector/Dockerfile
            context: .
          - component: agent
            dockerfile: packaging/docker/Dockerfile
            context: .
          - component: ui
            dockerfile: web/cyberbox-ui/Dockerfile
            context: web/cyberbox-ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build (dry run)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
