name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}/cyberbox-target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: taiki-e/install-action@just
      - name: Smoke
        run: just smoke

  rust:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: ${{ runner.temp }}/cyberbox-target
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --workspace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/cyberbox-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run build
