name: Deploy

# Runs on push to master (after CI passes) or manual trigger
on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel in-progress deploys

# ── Required secrets (set in GitHub → Settings → Secrets) ──────────────────
#   AWS_ACCOUNT_ID        — e.g. 123456789012
#   AWS_REGION            — e.g. us-east-1
#   AWS_ROLE_ARN          — IAM role for OIDC federation (recommended) or use access keys
#   EC2_INSTANCE_ID       — e.g. i-01cd1461dc87dae1a (Docker Compose host)

permissions:
  id-token: write   # for OIDC federation with AWS
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ── Step 1: Run full CI first ──────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Step 2: Build & push Docker images to ECR ─────────────────────────────
  build-push:
    name: Build · ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: cyberbox-api
            dockerfile: apps/cyberbox-api/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-worker
            dockerfile: apps/cyberbox-worker/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-collector
            dockerfile: apps/cyberbox-collector/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-agent
            dockerfile: packaging/docker/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-ui
            dockerfile: web/cyberbox-ui/Dockerfile
            context: web/cyberbox-ui
            build_args: |
              VITE_AZURE_CLIENT_ID=3fd8922e-d137-4d50-b160-b552ceda18c1
              VITE_AZURE_TENANT_ID=a8014c28-79d4-4695-8890-0ed0bf766668
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repo (if not exists)
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.component }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ matrix.component }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:latest
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}

  # ── Step 3: Deploy to EC2 via SSM ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://siem.cyberboxsecurity.com.br
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /opt/cyberbox && IMAGE_TAG=${{ env.IMAGE_TAG }} bash deploy.sh"]}' \
            --timeout-seconds 600 \
            --comment "Deploy ${{ env.IMAGE_TAG }}" \
            --query 'Command.CommandId' \
            --output text)
          echo "SSM Command: $COMMAND_ID"

          # Wait for command to complete
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS (attempt $i/60)"
            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query '[StandardOutputContent,StandardErrorContent]' --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for SSM command"
          exit 1

      - name: Verify health
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["curl -sf http://localhost:8080/healthz && echo '' && docker compose -f /opt/cyberbox/docker-compose.prod.yml ps"]}' \
            --timeout-seconds 30 \
            --query 'Command.CommandId' \
            --output text)
          sleep 10
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '[Status,StandardOutputContent]' --output text
          echo "Deployment complete: ${{ env.IMAGE_TAG }}"
