name: Deploy

# Runs on push to master (after CI passes) or manual trigger
on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel in-progress deploys

# ── Required secrets (set in GitHub → Settings → Secrets) ──────────────────
#   AWS_ACCOUNT_ID        — e.g. 123456789012
#   AWS_REGION            — e.g. us-east-1
#   AWS_ROLE_ARN          — IAM role for OIDC federation (recommended) or use access keys
#   EKS_CLUSTER_NAME      — e.g. cyberbox-production
#   HELM_VALUES_OVERRIDE  — (optional) base64-encoded values override for Helm

permissions:
  id-token: write   # for OIDC federation with AWS
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  HELM_RELEASE: cyberbox
  HELM_NAMESPACE: cyberbox

jobs:
  # ── Step 1: Run full CI first ──────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Step 2: Build & push Docker images to ECR ─────────────────────────────
  build-push:
    name: Build · ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: cyberbox-api
            dockerfile: apps/cyberbox-api/Dockerfile
            context: .
          - component: cyberbox-worker
            dockerfile: apps/cyberbox-worker/Dockerfile
            context: .
          - component: cyberbox-collector
            dockerfile: apps/cyberbox-collector/Dockerfile
            context: .
          - component: cyberbox-agent
            dockerfile: packaging/docker/Dockerfile
            context: .
          - component: cyberbox-ui
            dockerfile: web/cyberbox-ui/Dockerfile
            context: web/cyberbox-ui
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repo (if not exists)
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.component }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ matrix.component }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:latest
          platforms: linux/amd64

  # ── Step 3: Deploy to EKS via Helm ────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://cyberbox.yourdomain.com
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Create namespace
        run: kubectl create namespace ${{ env.HELM_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/cyberbox \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} \
            --set global.image.tag=${{ env.IMAGE_TAG }} \
            --set global.image.pullPolicy=IfNotPresent \
            --set config.kafka.enabled=false \
            --set config.clickhouse.enabled=false \
            --set api.replicaCount=1 \
            --set worker.replicaCount=1 \
            --wait \
            --timeout 10m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide
          echo ""
          echo "=== Pod describe (non-Running) ==="
          for pod in $(kubectl get pods -n ${{ env.HELM_NAMESPACE }} --no-headers | grep -v Running | awk '{print $1}'); do
            echo "--- $pod ---"
            kubectl describe pod "$pod" -n ${{ env.HELM_NAMESPACE }} | tail -30
            echo ""
            echo "--- logs $pod ---"
            kubectl logs "$pod" -n ${{ env.HELM_NAMESPACE }} --tail=50 2>/dev/null || true
            echo ""
          done
          echo "=== Events ==="
          kubectl get events -n ${{ env.HELM_NAMESPACE }} --sort-by='.lastTimestamp' | tail -30

      - name: Verify deployment
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide
          echo ""
          echo "=== Rollout status ==="
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api -n ${{ env.HELM_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-ui -n ${{ env.HELM_NAMESPACE }} --timeout=120s
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.HELM_NAMESPACE }}

      - name: Post-deploy health check
        run: |
          # Wait for API to be reachable via cluster DNS
          API_POD=$(kubectl get pods -n ${{ env.HELM_NAMESPACE }} -l app.kubernetes.io/component=api -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ env.HELM_NAMESPACE }} $API_POD -- wget -qO- http://localhost:8080/healthz || echo "Health check via exec not available (distroless). Checking via port-forward..."
          echo "Deployment complete: ${{ env.IMAGE_TAG }}"
