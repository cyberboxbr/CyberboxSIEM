name: Deploy

# Runs on push to master (after CI passes) or manual trigger
on:
  push:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [staging, production]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # never cancel in-progress deploys

# ── Required secrets (set in GitHub → Settings → Secrets) ──────────────────
#   AWS_ACCOUNT_ID        — e.g. 123456789012
#   AWS_REGION            — e.g. us-east-1
#   AWS_ROLE_ARN          — IAM role for OIDC federation (recommended) or use access keys
#   EKS_CLUSTER_NAME      — e.g. cyberbox-production
#   HELM_VALUES_OVERRIDE  — (optional) base64-encoded values override for Helm

permissions:
  id-token: write   # for OIDC federation with AWS
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION || 'us-east-1' }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}
  HELM_RELEASE: cyberbox
  HELM_NAMESPACE: cyberbox

jobs:
  # ── Step 1: Run full CI first ──────────────────────────────────────────────
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # ── Step 2: Build & push Docker images to ECR ─────────────────────────────
  build-push:
    name: Build · ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: cyberbox-api
            dockerfile: apps/cyberbox-api/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-worker
            dockerfile: apps/cyberbox-worker/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-collector
            dockerfile: apps/cyberbox-collector/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-agent
            dockerfile: packaging/docker/Dockerfile
            context: .
            build_args: ""
          - component: cyberbox-ui
            dockerfile: web/cyberbox-ui/Dockerfile
            context: web/cyberbox-ui
            build_args: |
              VITE_AZURE_CLIENT_ID=3fd8922e-d137-4d50-b160-b552ceda18c1
              VITE_AZURE_TENANT_ID=a8014c28-79d4-4695-8890-0ed0bf766668
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repo (if not exists)
        run: |
          aws ecr describe-repositories --repository-names ${{ matrix.component }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ matrix.component }} \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ matrix.component }}:latest
          platforms: linux/amd64
          build-args: ${{ matrix.build_args }}

  # ── Step 3: Deploy to EKS via Helm ────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-push
    environment:
      name: ${{ inputs.environment || 'production' }}
      url: https://siem.safebox.cyberboxsecurity.com.br
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Create namespace
        run: kubectl create namespace ${{ env.HELM_NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

      - name: Clean up failed release or orphaned resources
        run: |
          # If previous release is in failed state, uninstall so upgrade --install works cleanly
          STATUS=$(helm status ${{ env.HELM_RELEASE }} -n ${{ env.HELM_NAMESPACE }} --output json 2>/dev/null | jq -r '.info.status' 2>/dev/null || echo "not_found")
          if [ "$STATUS" = "failed" ] || [ "$STATUS" = "pending-install" ] || [ "$STATUS" = "pending-upgrade" ]; then
            echo "Previous release in '$STATUS' state — uninstalling for clean deploy"
            helm uninstall ${{ env.HELM_RELEASE }} -n ${{ env.HELM_NAMESPACE }} --wait || true
          else
            echo "Release status: $STATUS — proceeding with upgrade"
          fi
          # Remove orphaned ConfigMaps not owned by Helm
          for cm in cyberbox-nginx-conf; do
            OWNER=$(kubectl get configmap "$cm" -n ${{ env.HELM_NAMESPACE }} \
              -o jsonpath='{.metadata.labels.app\.kubernetes\.io/managed-by}' 2>/dev/null || echo "")
            if [ "$OWNER" != "Helm" ]; then
              echo "Deleting unowned ConfigMap $cm"
              kubectl delete configmap "$cm" -n ${{ env.HELM_NAMESPACE }} --ignore-not-found
            fi
          done
          # Delete Services whose type changed — Kubernetes rejects in-place type patches
          for svc in cyberbox-api cyberbox-ui cyberbox-collector; do
            CURRENT_TYPE=$(kubectl get service "$svc" -n ${{ env.HELM_NAMESPACE }} \
              -o jsonpath='{.spec.type}' 2>/dev/null || echo "")
            if [ "$CURRENT_TYPE" = "NodePort" ]; then
              echo "Deleting NodePort service $svc so Helm can recreate as ClusterIP"
              kubectl delete service "$svc" -n ${{ env.HELM_NAMESPACE }} --ignore-not-found
            fi
          done
          # Delete orphaned StatefulSet PVCs left by previous atomic rollbacks
          # Only delete if Pending (stuck); keep Bound PVCs to reuse provisioned volumes
          for pvc in data-redpanda-0 data-clickhouse-0; do
            PVC_STATUS=$(kubectl get pvc "$pvc" -n ${{ env.HELM_NAMESPACE }} -o jsonpath='{.status.phase}' 2>/dev/null || echo "")
            if [ "$PVC_STATUS" = "Pending" ]; then
              echo "Deleting stuck PVC $pvc (phase: Pending)"
              kubectl delete pvc "$pvc" -n ${{ env.HELM_NAMESPACE }} --ignore-not-found
            elif [ -n "$PVC_STATUS" ]; then
              echo "Keeping PVC $pvc (phase: $PVC_STATUS)"
            fi
          done

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm/cyberbox \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --set global.image.registry=${{ env.ECR_REGISTRY }} \
            --set global.image.tag=${{ env.IMAGE_TAG }} \
            --set global.image.pullPolicy=IfNotPresent \
            --wait \
            --timeout 20m

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide
          echo ""
          echo "=== PVC status ==="
          kubectl get pvc -n ${{ env.HELM_NAMESPACE }} 2>/dev/null || true
          echo ""
          echo "=== StatefulSets ==="
          kubectl get statefulset -n ${{ env.HELM_NAMESPACE }} -o wide 2>/dev/null || true
          echo ""
          echo "=== All pod logs (last 50 lines each) ==="
          for pod in $(kubectl get pods -n ${{ env.HELM_NAMESPACE }} --no-headers | awk '{print $1}'); do
            echo "--- logs $pod (current) ---"
            kubectl logs "$pod" -n ${{ env.HELM_NAMESPACE }} --tail=50 --all-containers 2>/dev/null || true
            echo ""
            echo "--- logs $pod (previous) ---"
            kubectl logs "$pod" -n ${{ env.HELM_NAMESPACE }} --tail=50 --all-containers --previous 2>/dev/null || true
            echo ""
          done
          echo ""
          echo "=== Pod describe (non-Running or restarted) ==="
          for pod in $(kubectl get pods -n ${{ env.HELM_NAMESPACE }} --no-headers | grep -v -E '1/1.*Running.*0 ' | awk '{print $1}'); do
            echo "--- describe $pod ---"
            kubectl describe pod "$pod" -n ${{ env.HELM_NAMESPACE }} | tail -50
            echo ""
          done
          echo "=== Events ==="
          kubectl get events -n ${{ env.HELM_NAMESPACE }} --sort-by='.lastTimestamp' | tail -60

      - name: Verify deployment
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} -o wide
          echo ""
          echo "=== Rollout status ==="
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-api -n ${{ env.HELM_NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/${{ env.HELM_RELEASE }}-ui -n ${{ env.HELM_NAMESPACE }} --timeout=120s
          echo ""
          echo "=== Services ==="
          kubectl get svc -n ${{ env.HELM_NAMESPACE }}

      - name: Post-deploy health check
        run: |
          # Wait for API to be reachable via cluster DNS
          API_POD=$(kubectl get pods -n ${{ env.HELM_NAMESPACE }} -l app.kubernetes.io/component=api -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n ${{ env.HELM_NAMESPACE }} $API_POD -- wget -qO- http://localhost:8080/healthz || echo "Health check via exec not available (distroless). Checking via port-forward..."
          echo "Deployment complete: ${{ env.IMAGE_TAG }}"
