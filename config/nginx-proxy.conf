worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Upstream backends
    upstream ui {
        server cyberbox-ui:3000;
    }

    upstream api {
        server cyberbox-api:8080;
    }

    # Redirect HTTP to HTTPS (if ever exposed)
    server {
        listen 80;
        server_name siem.cyberboxsecurity.com.br;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name siem.cyberboxsecurity.com.br;

        ssl_certificate     /etc/letsencrypt/live/siem.cyberboxsecurity.com.br/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/siem.cyberboxsecurity.com.br/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Max body size for event ingest
        client_max_body_size 10m;

        # API proxy
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 300s;
        }

        # Health + metrics passthrough
        location = /healthz {
            proxy_pass http://api/healthz;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /metrics {
            proxy_pass http://api/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # SSE alerts stream
        location = /api/v1/alerts/stream {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        # WebSocket alerts
        location = /api/v1/alerts/ws {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_read_timeout 3600s;
        }

        # UI SPA — static assets with cache, SPA fallback
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
            proxy_pass http://ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location / {
            proxy_pass http://ui;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # No cache for HTML (SPA index)
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }
}
