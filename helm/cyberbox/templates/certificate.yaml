{{- if and .Values.ingress.enabled .Values.ingress.tls -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cyberbox.fullname" . }}-tls
  labels:
    {{- include "cyberbox.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName | default "siem-tls-secret" }}
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.host | quote }}
{{- end }}
