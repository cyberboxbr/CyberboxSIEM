{{- if not .Values.secrets.existingSecret -}}
{{- $clickhousePassword := coalesce .Values.secrets.clickhousePassword .Values.clickhouse.password "" -}}
{{- $ingestApiKey := coalesce .Values.secrets.ingestApiKey .Values.config.auth.ingestApiKey "" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cyberbox.secretName" . }}
  labels:
    {{- include "cyberbox.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLICKHOUSE_PASSWORD: {{ default "" $clickhousePassword | squote }}
  CYBERBOX__CLICKHOUSE_PASSWORD: {{ default "" $clickhousePassword | squote }}
  CYBERBOX__INGEST_API_KEY: {{ default "" $ingestApiKey | squote }}
{{- end }}
