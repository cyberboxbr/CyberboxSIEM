## CyberboxSIEM Helm Chart — Default Values
## Sized for: ~50 hosts, single-tenant (safebox)

global:
  image:
    registry: ghcr.io/cyberboxsiem
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# API — Axum HTTP server
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-api
  service:
    type: ClusterIP
    nodePort: ""  # set when type=NodePort (e.g. 30080)
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Worker — Kafka consumer for stream detection + ClickHouse sink
# ---------------------------------------------------------------------------
worker:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-worker
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Collector — Log collector (syslog UDP/TCP)
# ---------------------------------------------------------------------------
collector:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-collector
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    nodePorts:
      udp: ""  # set when type=NodePort (e.g. 30514) — syslog UDP
      tcp: ""  # set when type=NodePort (e.g. 30601) — syslog TCP
  ports:
    udp: 514
    tcp: 601
  # NLB — public syslog-TLS endpoint for client firewalls/routers
  nlb:
    enabled: false
    syslogTlsPort: 6514
    certificateArn: ""
    eipAllocations: ""
    exposePlainTcp: false
    exposeAgentPort: false
    annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Agent — DaemonSet for host-level log collection
# ---------------------------------------------------------------------------
agent:
  enabled: false
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-agent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# UI — React SPA served by nginx
# ---------------------------------------------------------------------------
ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-ui
  service:
    type: ClusterIP
    nodePort: ""  # set when type=NodePort (e.g. 30300)
  resources:
    requests:
      cpu: 32m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  backendUrl: "http://cyberbox-api:8080"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Redpanda — lightweight Kafka-compatible event bus (single node)
# ---------------------------------------------------------------------------
redpanda:
  enabled: true
  image: docker.redpanda.com/redpandadata/redpanda:v24.3.3
  memory: "1024M"  # Redpanda --memory flag; must be < container limit to leave room for overhead
  storage: 30Gi
  storageClass: "gp2"
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

# ---------------------------------------------------------------------------
# ClickHouse — columnar event store (single node)
# ---------------------------------------------------------------------------
clickhouse:
  enabled: true
  image: clickhouse/clickhouse-server:24.8
  user: cyberbox
  password: ""  # deprecated fallback; prefer secrets.clickhousePassword or secrets.existingSecret
  storage: 100Gi
  storageClass: "gp2"
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi

# ---------------------------------------------------------------------------
# Platform configuration (injected via ConfigMap)
# ---------------------------------------------------------------------------
config:
  kafka:
    enabled: true
    brokers: "redpanda:9092"
    rawTopic: "cyberbox.events.raw"
    normalizedTopic: "cyberbox.events.normalized"
    alertsTopic: "cyberbox.alerts"
  clickhouse:
    enabled: true
    sinkEnabled: true
    host: "clickhouse"
    port: 8123
    database: "cyberbox"
    table: "events_hot"
    retentionDays: 30
  auth:
    disabled: false
    oidcIssuer: "https://login.microsoftonline.com/a8014c28-79d4-4695-8890-0ed0bf766668/v2.0"
    oidcAudience: "api://3fd8922e-d137-4d50-b160-b552ceda18c1"
    tenantIdOverride: "safebox"  # single-tenant mode — all data scoped to "safebox"
    ingestApiKey: ""  # deprecated fallback; prefer secrets.ingestApiKey or secrets.existingSecret
  epsLimit: 5000  # ~50 hosts × 100 EPS average

# ---------------------------------------------------------------------------
# Secrets
# Existing secrets should expose:
#   CLICKHOUSE_PASSWORD
#   CYBERBOX__CLICKHOUSE_PASSWORD
#   CYBERBOX__INGEST_API_KEY
# ---------------------------------------------------------------------------
secrets:
  existingSecret: ""
  clickhousePassword: ""
  ingestApiKey: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  host: "siem.cyberboxsecurity.com.br"
  certificateArn: ""
  annotations: {}
  tls: true
  tlsSecretName: "siem-tls-secret"

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor
# ---------------------------------------------------------------------------
prometheus:
  serviceMonitor:
    enabled: false
    interval: 15s
    namespace: ""
    additionalLabels: {}
