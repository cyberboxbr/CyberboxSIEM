## CyberboxSIEM Helm Chart — Default Values

global:
  image:
    registry: ghcr.io/cyberboxsiem
    tag: latest
    pullPolicy: IfNotPresent
  imagePullSecrets: []

# ---------------------------------------------------------------------------
# API — Axum HTTP server
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-api
  service:
    type: ClusterIP
    nodePort: ""  # set when type=NodePort (e.g. 30080)
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 1
    targetCPUUtilizationPercentage: 70
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Worker — Kafka consumer for stream detection
# ---------------------------------------------------------------------------
worker:
  enabled: true
  replicaCount: 2
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-worker
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 4Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Collector — Log collector (syslog UDP/TCP)
# ---------------------------------------------------------------------------
collector:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-collector
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  service:
    type: ClusterIP
    nodePorts:
      udp: ""  # set when type=NodePort (e.g. 30514) — syslog UDP
      tcp: ""  # set when type=NodePort (e.g. 30601) — syslog TCP
  ports:
    udp: 514
    tcp: 601
  # NLB — public syslog-TLS endpoint for client firewalls/routers
  nlb:
    enabled: false
    syslogTlsPort: 6514
    certificateArn: ""       # ACM cert ARN for TLS termination at NLB
    eipAllocations: ""       # comma-separated EIP allocation IDs for static IPs
    exposePlainTcp: false    # also expose plain TCP 601 (only for VPN clients)
    exposeAgentPort: false   # expose 443 for agent HTTPS push
    annotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Agent — DaemonSet for host-level log collection
# ---------------------------------------------------------------------------
agent:
  enabled: false
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-agent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# UI — React SPA served by nginx
# ---------------------------------------------------------------------------
ui:
  enabled: true
  replicaCount: 1
  image:
    repository: ""  # defaults to global.image.registry/cyberbox-ui
  service:
    type: ClusterIP
    nodePort: ""  # set when type=NodePort (e.g. 30300)
  resources:
    requests:
      cpu: 64m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  backendUrl: "http://cyberbox-api:8080"
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ---------------------------------------------------------------------------
# Platform configuration (injected via ConfigMap)
# ---------------------------------------------------------------------------
config:
  kafka:
    enabled: true
    bootstrapServers: "redpanda:9092"
    rawTopic: "cyberbox.raw"
    normalizedTopic: "cyberbox.normalized"
  clickhouse:
    enabled: true
    host: "clickhouse"
    port: 8123
    database: "cyberbox"
  auth:
    disabled: false
    oidcIssuer: "https://login.microsoftonline.com/a8014c28-79d4-4695-8890-0ed0bf766668/v2.0"
    oidcAudience: "api://3fd8922e-d137-4d50-b160-b552ceda18c1"
    tenantIdOverride: "safebox"  # single-tenant mode — all data scoped to "safebox"
    ingestApiKey: "919302f136fc80b561a577491854bfc5a50c9d8489c66ce9f87f11d0ebf67b4d"
  epsLimit: 10000

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: "nginx"
  host: "siem.safebox.cyberboxsecurity.com.br"
  certificateArn: ""  # ACM cert ARN — if set, ALB terminates TLS (no K8s secret needed)
  annotations: {}
  tls: true
  tlsSecretName: "siem-tls-secret"

# ---------------------------------------------------------------------------
# Service Account
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor
# ---------------------------------------------------------------------------
prometheus:
  serviceMonitor:
    enabled: false
    interval: 15s
    namespace: ""
    additionalLabels: {}
