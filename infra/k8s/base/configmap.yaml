  CYBERBOX__CLICKHOUSE_SINK_ENABLED: "true"
  CYBERBOX__CLICKHOUSE_SINK_BATCH_SIZE: "5000"
  CYBERBOX__CLICKHOUSE_SINK_BATCH_MAX_BYTES: "8388608"
  CYBERBOX__CLICKHOUSE_SINK_FLUSH_INTERVAL_MS: "500"
  CYBERBOX__CLICKHOUSE_SINK_MAX_RETRIES: "6"
  CYBERBOX__CLICKHOUSE_SINK_RETRY_BACKOFF_BASE_MS: "250"
