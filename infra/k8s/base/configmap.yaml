apiVersion: v1
kind: ConfigMap
metadata:
  name: cyberbox-config
  namespace: cyberbox
data:
  CYBERBOX__BIND_ADDR: 0.0.0.0:8080
  CYBERBOX__REDPANDA_BROKERS: redpanda:9092
