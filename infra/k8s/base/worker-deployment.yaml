apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberbox-worker
  namespace: cyberbox
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cyberbox-worker
  template:
    metadata:
      labels:
        app: cyberbox-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/cyberbox/siem-worker:latest
          envFrom:
            - configMapRef:
                name: cyberbox-config
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
