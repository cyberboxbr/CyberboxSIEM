apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cyberbox-app-egress-external
  namespace: cyberbox
spec:
  podSelector:
    matchLabels:
      security.cyberbox.io/tier: app
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
