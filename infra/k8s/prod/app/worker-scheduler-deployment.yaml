apiVersion: apps/v1
kind: Deployment
metadata:
  name: cyberbox-worker-scheduler
  namespace: cyberbox
  labels:
    app: cyberbox-worker-scheduler
    worker-role: scheduler
    app.kubernetes.io/part-of: cyberbox-siem
    security.cyberbox.io/tier: app
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: cyberbox-worker-scheduler
  template:
    metadata:
      labels:
        app: cyberbox-worker-scheduler
        worker-role: scheduler
        app.kubernetes.io/part-of: cyberbox-siem
        security.cyberbox.io/tier: app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9091"
        prometheus.io/path: /metrics
    spec:
      serviceAccountName: cyberbox-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      containers:
        - name: worker
          image: ghcr.io/cyberbox/siem-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9091
          env:
            - name: CYBERBOX__WORKER_ROLE
              value: scheduler
            - name: CYBERBOX__CLICKHOUSE_SINK_ENABLED
              value: "false"
          envFrom:
            - configMapRef:
                name: cyberbox-config
            - secretRef:
                name: cyberbox-runtime-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
