title: Entra ID Conditional Access Policy Disabled
id: 0907f5d6-c2a5-4e3a-bf72-5e32
status: stable
description: |
  Detects when a Conditional Access policy is deleted or disabled in
  Entra ID. Attackers who gain admin access may disable CA policies
  to allow sign-ins from blocked locations or without MFA.
logsource:
  product: azure
  service: entra_id
detection:
  selection:
    Operation|contains:
      - Delete conditional access policy
      - Update conditional access policy
  condition: selection
level: critical
tags:
  - attack.defense_evasion
  - attack.t1562.001
falsepositives:
  - Planned CA policy updates during maintenance windows
