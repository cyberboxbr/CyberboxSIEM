title: Entra ID Failed Sign-In (Multiple Attempts)
id: 0907f5d6-c2a5-4e3a-bf72-5e2800000000
status: stable
description: |
  Detects multiple failed sign-in attempts to Microsoft Entra ID from
  the same IP address, indicating a brute force or password spray attack.
  Matches Audit.AzureActiveDirectory events with Operation=UserLoginFailed.
logsource:
  product: azure
  service: entra_id
detection:
  selection:
    Operation: UserLoginFailed
  condition: selection | count() by ClientIP > 5
  timeframe: 10m
level: high
tags:
  - attack.credential_access
  - attack.t1110
falsepositives:
  - Users repeatedly mistyping password
  - Password manager sync issues
