title: Entra ID MFA Denied or Fraud Reported
id: 0907f5d6-c2a5-4e3a-bf72-5e29
status: stable
description: |
  Detects when MFA is denied or a user reports MFA fraud in Entra ID.
  This can indicate an attacker who has the password but is blocked by
  MFA, or a user alerting that someone is trying to access their account.
logsource:
  product: azure
  service: entra_id
detection:
  selection_denied:
    Operation: UserLoginFailed
    ResultStatus|contains: MFA
  selection_fraud:
    Operation|contains: Fraud
  condition: selection_denied or selection_fraud
level: high
tags:
  - attack.credential_access
  - attack.t1621
falsepositives:
  - User accidentally denying their own MFA prompt
