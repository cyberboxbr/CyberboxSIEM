title: Entra ID Password Reset by Admin
id: 0907f5d6-c2a5-4e3a-bf72-5e3300000000
status: stable
description: |
  Detects when an administrator resets another user's password in Entra ID.
  This is a common persistence technique — an attacker with admin access
  resets a victim's password to gain access to their account.
logsource:
  product: azure
  service: entra_id
detection:
  selection:
    Operation|contains: Reset password
  filter_self:
    Operation|contains: self-service
  condition: selection and not filter_self
level: medium
tags:
  - attack.persistence
  - attack.t1098
falsepositives:
  - Helpdesk resetting passwords for locked-out users
