title: Financial - Bulk Data Export or Download
id: 0907f5d6-c2a5-4e3a-bf72-6f0000000003
status: stable
description: |
  Detects large volume data exports from database engines. Triggers on
  SQL export/dump commands logged by database servers (not generic app logs).
logsource:
  product: linux
  service: syslog
detection:
  selection_db_engine:
    app_name:
      - 'postgres'
      - 'postgresql'
      - 'mysql'
      - 'mysqld'
      - 'mssql'
      - 'sqlservr'
      - 'mongod'
      - 'oracle'
  selection_export:
    message|contains:
      - 'COPY'
      - 'INTO OUTFILE'
      - 'bcp'
      - 'pg_dump'
      - 'mysqldump'
      - 'mongoexport'
      - 'bulk extract'
  condition: selection_db_engine and selection_export | count() > 100
  timeframe: 10m
level: high
tags:
  - attack.exfiltration
  - attack.t1048
falsepositives:
  - Authorized batch reporting processes
  - Database migration or ETL pipelines
