title: High Volume Firewall Pass from Single External IP
id: 0907f5d6-c2a5-4e3a-bf72-6f2000000003
status: stable
description: |
  Detects a high volume of allowed inbound firewall connections from a
  single external IP. Unlike blocked traffic (which is expected), a large
  number of ALLOWED connections from one source may indicate an attacker
  who has found an open service. Cross-reference the source IP with the
  AbuseIPDB enrichment panel to check reputation.
logsource:
  product: linux
  service: syslog
detection:
  selection:
    app_name: filterlog
    message|contains|all:
      - ',pass,'
      - ',in,'
  condition: selection | count() by source_ip > 500
  timeframe: 5m
level: high
tags:
  - attack.initial_access
  - attack.t1190
falsepositives:
  - Legitimate high-traffic services (web servers, APIs)
  - Health check probes from monitoring systems
