title: LGPD - Consent Record Modification
id: 0907f5d6-c2a5-4e3a-bf72-6f1000000003
status: stable
description: |
  Detects SQL DML operations targeting consent/permission tables in
  database query logs. Only triggers on actual database engine logs.
  LGPD Art. 8 requires documented, revocable consent.
logsource:
  product: linux
  service: syslog
detection:
  selection_db_engine:
    app_name:
      - 'postgres'
      - 'postgresql'
      - 'mysql'
      - 'mysqld'
      - 'mssql'
      - 'sqlservr'
      - 'mongod'
      - 'oracle'
  selection_operation:
    message|contains:
      - 'UPDATE'
      - 'DELETE'
      - 'INSERT'
      - 'ALTER'
  selection_consent_tables:
    message|contains:
      - 'consent'
      - 'consentimento'
      - 'opt_in'
      - 'opt_out'
      - 'lgpd_consent'
      - 'privacy_preference'
  condition: selection_db_engine and selection_operation and selection_consent_tables
level: critical
tags:
  - attack.impact
  - attack.t1565
falsepositives:
  - Legitimate consent updates from data subject requests
  - Consent management platform operations
