title: LGPD - Bulk Access to Personal Data Records
id: 0907f5d6-c2a5-4e3a-bf72-6f1000000001
status: stable
description: |
  Detects bulk access to personal data fields protected under LGPD (Lei Geral
  de Protecao de Dados). Monitors for queries or exports containing CPF, RG,
  email patterns, or other PII identifiers in high volume. LGPD Art. 6 requires
  data processing to follow necessity and purpose limitation principles.
logsource:
  product: linux
  service: syslog
detection:
  selection_db_engine:
    app_name:
      - 'postgres'
      - 'postgresql'
      - 'mysql'
      - 'mysqld'
      - 'mssql'
      - 'sqlservr'
      - 'mongod'
      - 'oracle'
  selection_pii:
    message|contains:
      - 'cpf'
      - 'rg_number'
      - 'nome_completo'
      - 'email'
      - 'telefone'
      - 'endereco'
      - 'data_nascimento'
      - 'personal_data'
      - 'dados_pessoais'
  selection_bulk:
    message|contains:
      - 'bulk'
      - 'export'
      - 'SELECT.*FROM'
      - 'query'
      - 'dump'
      - 'extract'
      - 'report'
  condition: selection_db_engine and selection_pii and selection_bulk | count() > 50
  timeframe: 10m
level: high
tags:
  - attack.collection
  - attack.t1005
falsepositives:
  - Authorized data processing for contractual obligations (LGPD Art. 7)
  - Compliance reporting required by regulatory bodies
  - Approved data analytics pipelines with proper consent basis
