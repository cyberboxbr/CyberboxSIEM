title: LGPD - Unauthorized Access to PII Fields
id: 0907f5d6-c2a5-4e3a-bf72-6f1000000005
status: stable
description: |
  Detects database queries targeting PII columns (CPF, RG, phone, address)
  from non-approved applications. LGPD Art. 46 requires technical measures
  to protect personal data from unauthorized access. Only triggers on
  actual SQL query log entries from database engines.
logsource:
  product: linux
  service: syslog
detection:
  selection_db_engine:
    app_name:
      - 'postgres'
      - 'postgresql'
      - 'mysql'
      - 'mysqld'
      - 'mssql'
      - 'sqlservr'
      - 'mongod'
      - 'oracle'
  selection_pii_columns:
    message|contains:
      - 'cpf'
      - 'rg_number'
      - 'telefone'
      - 'endereco'
      - 'data_nascimento'
      - 'nome_completo'
      - 'social_security'
  filter_approved_apps:
    message|contains:
      - 'crm-service'
      - 'hr-portal'
      - 'billing-service'
      - 'compliance-audit'
  condition: selection_db_engine and selection_pii_columns and not filter_approved_apps
level: high
tags:
  - attack.collection
  - attack.t1005
falsepositives:
  - New application not yet added to the approved filter
  - DBA running ad-hoc queries with proper authorization
