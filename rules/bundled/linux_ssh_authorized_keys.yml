title: SSH Authorized Keys Modification
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e12
status: stable
description: |
  Detects processes writing to authorized_keys files, a common
  technique for SSH backdoor persistence.
  Works with FIM source or procmon command line monitoring.
logsource:
  product: linux
  category: process_creation
detection:
  selection:
    CommandLine|contains:
      - 'authorized_keys'
      - '.ssh/authorized'
  filter_ssh_keygen:
    Image|endswith: '/ssh-keygen'
  condition: selection and not filter_ssh_keygen
level: high
tags:
  - attack.persistence
  - attack.t1098.004
  - attack.lateral_movement
falsepositives:
  - Legitimate SSH key management (Ansible, Puppet)
