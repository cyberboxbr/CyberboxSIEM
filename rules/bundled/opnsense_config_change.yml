title: OPNsense Configuration Change
id: 0907f5d6-c2a5-4e3a-bf72-5e25
status: stable
description: |
  Detects configuration changes on the OPNsense firewall via configd.py.
  Monitors for actions like saving config, applying filters, reloading
  services. Useful for change auditing and detecting unauthorized modifications.
logsource:
  product: linux
  service: syslog
detection:
  selection_configd:
    app_name: configd.py
    message|contains: action allowed
  filter_routine:
    message|contains:
      - syslog.archive
      - syslog.list.applications
      - health.updaterrd
      - filter.update_tables
      - ping_hosts
      - firmware
      - template.reload
      - interface.list
      - route.show
      - dns.diagnostics
      - service.
      - cron
      - atrun
      - updaterrd
      - filter_update_tables
  condition: selection_configd and not filter_routine
level: medium
tags:
  - attack.defense_evasion
  - attack.t1562
falsepositives:
  - Routine configuration changes by authorized administrators
  - Automated config management (cron jobs, plugins)
