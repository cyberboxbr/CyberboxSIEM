title: OPNsense SSH Authentication Timeout
id: 0907f5d6-c2a5-4e3a-bf72-5e26
status: stable
description: |
  Detects SSH authentication timeouts on OPNsense, which often indicate
  automated scanners or brute-force tools that connect but fail to complete
  authentication within the allowed time.
logsource:
  product: linux
  service: syslog
detection:
  selection:
    app_name: sshd
    message|contains: Timeout before authentication
  condition: selection | count() by source_ip > 3
  timeframe: 10m
level: medium
tags:
  - attack.credential_access
  - attack.t1110
falsepositives:
  - Slow network connections causing legitimate timeouts
