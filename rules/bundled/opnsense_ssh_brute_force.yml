title: OPNsense SSH Brute Force (Auth Failures)
id: 0907f5d6-c2a5-4e3a-bf72-5e21
status: stable
description: |
  Detects multiple SSH authentication failures on the OPNsense firewall
  from the same source IP, as reported by the audit subsystem.
  app_name=audit, message contains "could not authenticate for sshd".
logsource:
  product: linux
  service: syslog
detection:
  selection:
    app_name: audit
    message|contains: could not authenticate for sshd
  condition: selection | count() by source_ip > 5
  timeframe: 5m
level: high
tags:
  - attack.credential_access
  - attack.t1110
falsepositives:
  - Legitimate admin mistyping password multiple times
