title: Mimikatz LSASS Memory Access
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e01
status: stable
description: |
  Detects process access to lsass.exe with suspicious access rights
  commonly used by Mimikatz and other credential dumping tools.
  Sysmon EventID 10 (ProcessAccess).
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: ProcessAccess
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'   # PROCESS_QUERY_LIMITED_INFORMATION + PROCESS_VM_READ
      - '0x1410'   # + PROCESS_QUERY_INFORMATION
      - '0x1438'   # full mimikatz access mask
      - '0x143a'
      - '0x1fffff' # PROCESS_ALL_ACCESS
  filter_legitimate:
    Image|endswith:
      - '\MsMpEng.exe'
      - '\csrss.exe'
      - '\wmiprvse.exe'
      - '\svchost.exe'
  condition: selection and not filter_legitimate
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
falsepositives:
  - Antivirus and EDR tools
  - System management agents
