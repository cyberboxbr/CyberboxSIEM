title: Suspicious Named Pipe Creation
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e07
status: stable
description: |
  Detects creation of named pipes commonly used by offensive tools
  (Cobalt Strike, Metasploit, PsExec).
  Sysmon EventID 17 (PipeCreate).
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: PipeCreate
    PipeName|contains:
      - '\MSSE-'
      - '\msagent_'
      - '\postex_'
      - '\status_'
      - '\mojo.'
      - '\interprocess.'
      - '\lsarpc'
      - '\samr'
      - '\netlogon'
      - '\wkssvc'
      - '\svcctl'
      - '\atsvc'
      - '\epmapper'
      - '\psexesvc'
      - '\remcom'
      - '\csexec'
  condition: selection
level: high
tags:
  - attack.lateral_movement
  - attack.t1021.002
  - attack.defense_evasion
  - attack.t1559
falsepositives:
  - Legitimate use of PsExec by administrators
  - System management tools
