title: Process Tampering Detected
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e17
status: stable
description: |
  Detects process hollowing or herpaderping techniques where a process
  image is modified after creation but before execution.
  Sysmon EventID 25 (ProcessTampering).
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: ProcessTampering
  condition: selection
level: critical
tags:
  - attack.defense_evasion
  - attack.t1055.012
falsepositives:
  - Rare legitimate software using self-modifying techniques
