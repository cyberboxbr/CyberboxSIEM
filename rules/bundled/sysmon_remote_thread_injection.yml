title: Remote Thread Injection into System Process
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e03
status: stable
description: |
  Detects creation of a remote thread in a system process, a technique
  used for process injection (DLL injection, shellcode injection).
  Sysmon EventID 8 (CreateRemoteThread).
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: CreateRemoteThread
    TargetImage|endswith:
      - '\svchost.exe'
      - '\explorer.exe'
      - '\lsass.exe'
      - '\csrss.exe'
      - '\winlogon.exe'
      - '\wininit.exe'
      - '\services.exe'
  filter_system:
    SourceImage|endswith:
      - '\csrss.exe'
      - '\MsMpEng.exe'
      - '\lsass.exe'
  condition: selection and not filter_system
level: critical
tags:
  - attack.defense_evasion
  - attack.t1055
  - attack.privilege_escalation
falsepositives:
  - Security products injecting monitoring hooks
