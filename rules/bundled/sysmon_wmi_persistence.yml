title: WMI Event Subscription Persistence
id: 0907f5d6-c2a5-4e3a-bf72-3b3f7a4c5e08
status: stable
description: |
  Detects creation of WMI event filters/consumers used for persistence.
  Sysmon EventID 19/20/21 (WMI events).
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type:
      - WmiEventFilter
      - WmiEventConsumer
      - WmiEventConsumerToFilter
  condition: selection
level: high
tags:
  - attack.persistence
  - attack.t1546.003
falsepositives:
  - Legitimate WMI-based monitoring tools
  - SCCM
