title: Windows Brute Force - Multiple Failed Logons
id: a1b2c3d4-e5f6-7890-abcd-100000000001
status: stable
description: |
  Detects multiple failed logon attempts from the same source within 5 minutes,
  indicating a brute force or credential stuffing attack. Triggers on Security
  EventID 4625 (failed logon). Covers RDP, SMB, and local logon attempts.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id: '4625'
  condition: selection | count() by source_ip > 10
  timeframe: 5m
level: high
tags:
  - attack.credential_access
  - attack.t1110
falsepositives:
  - Misconfigured service accounts retrying authentication
  - Vulnerability scanners running credential checks
