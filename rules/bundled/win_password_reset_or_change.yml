title: Windows Password Reset by Administrator
id: a1b2c3d4-e5f6-7890-abcd-100000000010
status: stable
description: |
  Detects administrative password resets (EventID 4724) and password changes
  (EventID 4723). Attackers who gain admin access often reset passwords to
  maintain persistence or lock out legitimate users.
logsource:
  product: windows
  service: security
detection:
  selection:
    event_id:
      - '4724'
      - '4723'
  condition: selection
level: medium
tags:
  - attack.persistence
  - attack.t1098
falsepositives:
  - Help desk resetting user passwords
  - Users changing their own passwords
