title: C2 Beacon — Outbound Connection from Suspicious Process
id: f2a3b4c5-d6e7-4f8a-9b0c-1d2e3f4a5b22
status: stable
description: |
  Detects outbound network connections from processes that do not normally
  make network connections — a strong indicator of C2 beaconing, reverse
  shells, or malware phoning home. Sysmon EventID 3 (NetworkConnect).
references:
  - https://attack.mitre.org/techniques/T1071/
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: NetworkConnect
    Initiated: 'true'
    DestinationPort:
      - 4444
      - 4445
      - 1337
      - 8888
      - 9999
      - 8443
      - 31337
  selection_unexpected_processes:
    event_type: NetworkConnect
    Initiated: 'true'
    Image|endswith:
      - '\mshta.exe'
      - '\wscript.exe'
      - '\cscript.exe'
      - '\regsvr32.exe'
      - '\rundll32.exe'
      - '\svchost.exe'
      - '\dllhost.exe'
    DestinationPort:
      - 80
      - 443
      - 8080
      - 8443
  condition: selection or selection_unexpected_processes
level: high
tags:
  - attack.command_and_control
  - attack.t1071
  - attack.t1095
falsepositives:
  - Development and testing environments using non-standard ports
  - Legitimate web proxies using alternative ports
  - VPN client software
