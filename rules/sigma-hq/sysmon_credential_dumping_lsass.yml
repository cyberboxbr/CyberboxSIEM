title: LSASS Memory Dump — Credential Access
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f14
status: stable
description: |
  Detects process access to LSASS memory, commonly performed by credential
  dumping tools like Mimikatz, ProcDump, or Task Manager. Accessing LSASS
  allows extraction of NTLM hashes and Kerberos tickets. Sysmon EventID 10.
references:
  - https://attack.mitre.org/techniques/T1003/001/
logsource:
  product: windows
  category: sysmon
detection:
  selection:
    event_type: ProcessAccess
    TargetImage|endswith: '\lsass.exe'
  selection_tools:
    SourceImage|endswith:
      - '\procdump.exe'
      - '\procdump64.exe'
      - '\taskmgr.exe'
      - '\processhacker.exe'
      - '\dumpert.exe'
  selection_generic:
    GrantedAccess|contains:
      - '0x1010'
      - '0x1038'
      - '0x40'
      - '0x1fffff'
  condition: selection and (selection_tools or selection_generic)
level: critical
tags:
  - attack.credential_access
  - attack.t1003.001
falsepositives:
  - Legitimate antivirus or EDR products that access LSASS for monitoring
  - Windows Defender Credential Guard activities
