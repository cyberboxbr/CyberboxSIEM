title: Shadow Copy Deletion — Ransomware Precursor
id: c3b5d8e2-4f7a-4c9d-8b2e-1a6f9c3d5e07
status: stable
description: |
  Detects deletion of Windows volume shadow copies via vssadmin, wmic, or
  PowerShell. This is a critical ransomware precursor step used to prevent
  recovery via Windows backup mechanisms. Sysmon EventID 1.
references:
  - https://attack.mitre.org/techniques/T1490/
logsource:
  product: windows
  category: sysmon
detection:
  selection_vssadmin:
    event_type: ProcessCreate
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains:
      - 'delete shadows'
      - 'resize shadowstorage'
  selection_wmic:
    event_type: ProcessCreate
    Image|endswith: '\wmic.exe'
    CommandLine|contains:
      - 'shadowcopy delete'
      - 'shadowcopy where'
  selection_powershell:
    event_type: ProcessCreate
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - 'Get-WmiObject Win32_Shadowcopy'
      - 'Win32_ShadowCopy'
      - 'Delete-WMIObject'
  condition: selection_vssadmin or selection_wmic or selection_powershell
level: critical
tags:
  - attack.impact
  - attack.t1490
falsepositives:
  - Authorized backup management scripts
  - Disk cleanup tools
